<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QA Checklist — jjlmoya</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 2rem; }
  h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #f8fafc; }
  h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin: 1.5rem 0 0.5rem; }
  .item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem; border-radius: 0.5rem; margin-bottom: 0.25rem; background: #1e293b; transition: opacity 0.2s; }
  .item.done { opacity: 0.4; }
  .item.done .name { text-decoration: line-through; }
  input[type=checkbox] { width: 1.1rem; height: 1.1rem; accent-color: #22c55e; cursor: pointer; flex-shrink: 0; }
  .name { flex: 1; font-size: 0.875rem; color: #cbd5e1; }
  a { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 0.3rem; text-decoration: none; font-weight: 500; }
  .local { background: #1d4ed8; color: #bfdbfe; }
  .prod  { background: #065f46; color: #a7f3d0; }
  a:hover { filter: brightness(1.2); }
  .stats { position: fixed; top: 1rem; right: 1.5rem; font-size: 0.8rem; color: #94a3b8; background: #1e293b; padding: 0.4rem 0.8rem; border-radius: 0.5rem; }
  .reset { margin-top: 2rem; background: #7f1d1d; color: #fca5a5; border: none; padding: 0.4rem 1rem; border-radius: 0.4rem; cursor: pointer; font-size: 0.8rem; }
  .reset:hover { background: #991b1b; }
</style>
</head>
<body>

<div class="stats" id="stats"></div>
<h1>QA Checklist</h1>

<h2>🍼 Bebés y Embarazo</h2>
<div id="list-babies"></div>

<h2>🎬 Audiovisual y Fotografía</h2>
<div id="list-audiovisual"></div>

<h2>🎨 Creatividad & Ocio</h2>
<div id="list-creative"></div>

<button class="reset" onclick="resetAll()">Resetear todo</button>

<script>
const LOCAL = 'http://localhost:4321';
const PROD  = 'https://www.jjlmoya.es';

const pages = {
  'list-babies': [
    'calculadora-dias-fertiles',
    'calculadora-semanas-embarazo',
    'calculadora-tomas-bebe',
    'calendario-vacunacion-espana-bebes',
    'conversor-tallas-bebe',
    'percentil-peso-talla-bebe',
  ],
  'list-audiovisual': [
    'calculadora-calidad-impresion',
    'calculadora-timelapse',
    'compresor-imagenes',
    'creador-collage-fotos',
    'distancia-tv',
    'editor-privacidad',
    'extractor-frames-video',
    'lente-cromatica',
    'limpiador-exif',
    'sincronizar-subtitulos',
  ],
  'list-creative': [
    'galleta-fortuna',
    'generador-excusas',
    'generador-patrones-cuentas',
    'generador-zalgo',
    'lanzador-dados',
    'pintor-sinestesia',
  ],
};

function getKey(slug) { return `qa:${slug}`; }
function isDone(slug) { return localStorage.getItem(getKey(slug)) === '1'; }
function setDone(slug, val) { localStorage.setItem(getKey(slug), val ? '1' : '0'); }

function render() {
  let total = 0, done = 0;

  for (const [containerId, slugs] of Object.entries(pages)) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    for (const slug of slugs) {
      total++;
      const checked = isDone(slug);
      if (checked) done++;
      const path = `/utilidades/${slug}/`;
      const div = document.createElement('div');
      div.className = 'item' + (checked ? ' done' : '');
      div.innerHTML = `
        <input type="checkbox" id="${slug}" ${checked ? 'checked' : ''}>
        <span class="name">${slug}</span>
        <a class="local" href="${LOCAL}${path}" target="_blank">local</a>
        <a class="prod"  href="${PROD}${path}"  target="_blank">prod</a>
      `;
      div.querySelector('input').addEventListener('change', (e) => {
        setDone(slug, e.target.checked);
        render();
      });
      container.appendChild(div);
    }
  }

  document.getElementById('stats').textContent = `${done} / ${total} ✓`;
}

function resetAll() {
  for (const slugs of Object.values(pages))
    slugs.forEach(s => localStorage.removeItem(getKey(s)));
  render();
}

render();
</script>
</body>
</html>
